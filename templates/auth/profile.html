{% extends "base.html" %}

{% block content %}
<div class="container mx-auto px-4 py-8">
    <div class="max-w-2xl mx-auto">
        <h1 class="text-3xl font-bold mb-8">Profile Settings</h1>

        <form method="POST" class="space-y-6">
            <div>
                <label for="name" class="block text-sm font-medium text-gray-700">Name</label>
                <input
                    type="text"
                    name="name"
                    id="name"
                    value="{{ current_user.name }}"
                    required
                    class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500"
                />
            </div>

            <div>
                <label for="bio" class="block text-sm font-medium text-gray-700">Bio</label>
                <textarea
                    name="bio"
                    id="bio"
                    rows="4"
                    class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500"
                >{{ current_user.bio or "" }}</textarea>
            </div>

            <div class="flex justify-end">
                <button
                    type="submit"
                    class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700"
                >
                    Save Changes
                </button>
            </div>
        </form>

        <div class="mt-12">
            <h2 class="text-2xl font-bold mb-6">Social Media Connections</h2>

            <div class="space-y-6">
                <div class="bg-white p-6 rounded-lg shadow">
                    <h3 class="text-lg font-medium text-gray-900">LinkedIn Connection</h3>
                    <div class="mt-4">
                        {% if current_user.linkedin_authorized %}
                        <p class="text-green-600">Connected to LinkedIn</p>
                        <form action="{{ url_for('auth.linkedin_disconnect') }}" method="POST" class="mt-2">
                            <button type="submit" class="text-red-600 hover:text-red-800">
                                Disconnect LinkedIn
                            </button>
                        </form>
                        {% else %}
                        <p class="text-gray-600">Not connected to LinkedIn</p>
                        <a
                            href="{{ url_for('auth.linkedin_connect') }}"
                            class="mt-2 inline-block bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700"
                        >
                            Connect LinkedIn
                        </a>
                        {% endif %}
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
